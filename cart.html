<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cart-Plant Shop</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Icon -->
    <link rel="icon" href="./images/plant.png" />
    <!-- Style -->
    <link rel="stylesheet" href="css/style.css" />
    <script>
      // loads
      window.addEventListener("load", function () {
        const loader = document.getElementById("loader");

        loader.style.opacity = "0";
        loader.style.transition = "0.5s ease";

        setTimeout(() => {
          loader.style.display = "none";
        }, 500);
      });
    </script>
  </head>
  <body>
    <!-- LOADING SCREEN -->
    <div id="loader">
      <div class="spinner"></div>
    </div>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm fw-bold fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">🌿 PlantShop</a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#shop">Shop</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="index.html#contact">Contact</a>
            </li>
          </ul>
          <button id="darkModeToggle" class="btn btn-sm btn-dark ms-3">
            🌙
          </button>
          <div>
            <div class="icon-cart">
              <a class="shop-logo" href="./cart.html">
                <i class="fa fa-shopping-cart"></i>
                <span id="cart-count">0</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <section class="cart">
      <h2>Your Cart 🛒</h2>

      <div id="cart-items"></div>

      <h3>Total: $<span id="total">0</span></h3>
    </section>
    <a href="checkout.html"
      ><button onclick="checkout()" class="btw btn-success">Checkout</button></a
    >
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const toggleBtn = document.getElementById("darkModeToggle");

        // Load saved mode
        if (localStorage.getItem("mode") === "dark") {
          document.body.classList.add("dark-mode");
          if (toggleBtn) toggleBtn.textContent = "☀️";
        }

        // Click toggle
        if (toggleBtn) {
          toggleBtn.addEventListener("click", function () {
            document.body.classList.toggle("dark-mode");

            if (document.body.classList.contains("dark-mode")) {
              localStorage.setItem("mode", "dark");
              toggleBtn.textContent = "☀️";
            } else {
              localStorage.setItem("mode", "light");
              toggleBtn.textContent = "🌙";
            }
          });
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
