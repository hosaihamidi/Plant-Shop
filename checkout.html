<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - PlantShop</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Icon -->
    <link rel="icon" href="./images/plant.png" />
    <!-- Style -->
    <link rel="stylesheet" href="css/style.css" />
    <script>
      // Wait until page fully loads
      window.addEventListener("load", function () {
        const loader = document.getElementById("loader");

        loader.style.opacity = "0";
        loader.style.transition = "0.5s ease";

        setTimeout(() => {
          loader.style.display = "none";
        }, 500);
      });
    </script>
  </head>

  <body>
    <!-- LOADING SCREEN -->
    <div id="loader">
      <div class="spinner"></div>
    </div>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm fw-bold fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">🌿 PlantShop</a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#shop">Shop</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="index.html#contact">Contact</a>
            </li>
          </ul>
          <button id="darkModeToggle" class="btn btn-sm btn-dark ms-3">
            🌙
          </button>
          <div>
            <div class="icon-cart">
              <a class="shop-logo" href="./cart.html">
                <i class="fa fa-shopping-cart"></i>
                <span id="cart-count">0</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <div class="container checkout-container">
      <!-- CART SUMMARY -->
      <div class="box">
        <h3>🛒 Your Order</h3>
        <div id="checkout-items"></div>

        <div class="total">Total: $<span id="checkout-total">0</span></div>
      </div>

      <!-- FORM -->
      <div class="box">
        <h3>📦 Shipping Details</h3>

        <input type="text" id="name" placeholder="Full Name" />
        <input type="text" id="address" placeholder="Address" />
        <input type="text" id="phone" placeholder="Phone Number" />

        <button onclick="placeOrder()">Place Order</button>
      </div>
      <div id="notice" class="bottom-notice">Order placed successfully 🎉</div>
    </div>

    <script>
      function getCart() {
        return JSON.parse(localStorage.getItem("cart")) || [];
      }

      function saveCart(cart) {
        localStorage.setItem("cart", JSON.stringify(cart));
      }

      // SHOW CART
      function loadCheckout() {
        let cart = getCart();
        let container = document.getElementById("checkout-items");
        let totalEl = document.getElementById("checkout-total");

        container.innerHTML = "";
        let total = 0;

        cart.forEach((item) => {
          total += item.price * item.qty;

          container.innerHTML += `
            <div class="cart-item">
              <span>${item.name} x ${item.qty}</span>
              <span>$${item.price * item.qty}</span>
            </div>
          `;
        });

        totalEl.textContent = total.toFixed(2);
      }

      // PLACE ORDER
      function placeOrder() {
        let name = document.getElementById("name").value;
        let address = document.getElementById("address").value;
        let phone = document.getElementById("phone").value;

        if (!name || !address || !phone) {
          alert("Please fill all fields!");
          return;
        }

        let cart = getCart();

        if (cart.length === 0) {
          alert("Your cart is empty!");
          return;
        }

        alert("🎉 Order placed successfully!");

        // clear cart
        localStorage.removeItem("cart");

        window.location.href = "index.html";
      }
      function showNotice(message) {
        let notice = document.getElementById("notice");

        notice.textContent = message;
        notice.classList.add("show");

        setTimeout(() => {
          notice.classList.remove("show");
        }, 2000);
      }

      function placeOrder() {
        let name = document.getElementById("name").value;
        let address = document.getElementById("address").value;
        let phone = document.getElementById("phone").value;

        if (!name || !address || !phone) {
          alert("Please fill all fields!");
          return;
        }

        let cart = getCart();

        if (cart.length === 0) {
          alert("Your cart is empty!");
          return;
        }

        // clear cart
        localStorage.removeItem("cart");

        // show notification
        showNotice("🎉 Order placed successfully!");

        // redirect after delay
        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);
      }
      loadCheckout();
      document.addEventListener("DOMContentLoaded", function () {
        const toggleBtn = document.getElementById("darkModeToggle");

        // load saved mode
        if (localStorage.getItem("mode") === "dark") {
          document.body.classList.add("dark-mode");
        }

        // button click
        if (toggleBtn) {
          toggleBtn.addEventListener("click", function () {
            document.body.classList.toggle("dark-mode");

            if (document.body.classList.contains("dark-mode")) {
              localStorage.setItem("mode", "dark");
            } else {
              localStorage.setItem("mode", "light");
            }
          });
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
